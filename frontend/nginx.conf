server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the hashed Vite asset bundles.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html so react-router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Light health endpoint for Railway probes.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
